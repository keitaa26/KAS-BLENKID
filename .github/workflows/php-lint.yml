name: PHP Syntax Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.2]

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: ${{ matrix.php }}

      - name: Validate PHP syntax
        run: |
          echo "Checking PHP syntax for all .php files"
          find . -type f -name '*.php' | sort | while read -r file; do
            echo "-- $file --"
            php -l "$file"
          done
