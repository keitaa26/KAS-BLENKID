name: PHP Syntax Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.2]

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: ${{ matrix.php }}

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -e
          echo "PHP version:"
          php -v
          echo "Checking PHP syntax for the app entry points and admin pages"
          php -l index.php
          php -l anggota.php
          php -l bayar.php
          php -l belum_bayar.php
          php -l config.php
          php -l dashboard.php
          php -l edit.php
          php -l functions.php
          php -l iuran.php
          php -l koneksi.php
          php -l login.php
          php -l logout.php
          php -l navbar.php
          php -l navbar_public.php
          php -l pengeluaran.php
          php -l publik.php
          php -l status.php
